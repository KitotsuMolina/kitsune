name: Release On Main

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve version/tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          if [[ -z "${VERSION:-}" ]]; then
            echo "Could not read version from Cargo.toml" >&2
            exit 1
          fi
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when tag already exists
        if: steps.version.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.tag }} already exists. Skipping release."

      - name: Build release binaries
        if: steps.version.outputs.exists != 'true'
        run: cargo build --release --locked --bins

      - name: Prepare assets
        if: steps.version.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp -f target/release/kitsune dist/kitsune-linux-x86_64
          cp -f target/release/kitsune-layer dist/kitsune-layer-linux-x86_64

      - name: Create and push tag
        if: steps.version.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release
        if: steps.version.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/kitsune-linux-x86_64
            dist/kitsune-layer-linux-x86_64
